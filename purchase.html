<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VioletVixen</title>
    <link rel="stylesheet" href="/css/purchase.css" />
  </head>
  <body>
    <!-- Nav bar -->
    <nav class="navbar" id="navbar">
      <div class="nav-container">
        <!-- Logo -->
        <a class="logo" href="/index1.html">
          <img src="Images/logo box.jpeg" alt="logo" />
        </a>
        <ul class="nav-links" id="navMenu">
          <li><a href="/index1.html">Home</a></li>

          <li><a href="/purchase.html">Products</a></li>
          <li><a href="/about.html">About</a></li>
        </ul>

        <!-- Hamburger -->

        <div class="menu-toggle" id="menuToggle" onclick="toggleMenu()">☰</div>
      </div>
    </nav>
    <!-- End Navbar -->


    <!-- hero section -->
     <h1>Book Collection</h1>

  <div id="bookContainer" class="grid"></div>
  
   
<div id="bookModal" class="modal">
  <div class="modal-content">
    
    <span class="close-btn" onclick="closeModal()">&times;</span>

    <div class="modal-body">
      
      <!-- LEFT: IMAGE -->
      <div class="modal-left">
        <img id="modalImg" src="" alt="">
      </div>

      <!-- RIGHT: CONTENT -->
      <div class="modal-right">
        <h2 id="modalTitle"></h2>
        <p id="modalDescription"></p>

        <!-- SCROLLABLE TRIGGER WARNINGS -->
        <div class="modal-scroll" id="modalWarnings"></div>

        <div class="modal-meta">
       <span id="modalRating"></span>
       <span id="modalPrice"></span>
        </div>

        <!-- BUY BUTTON -->
        <button id="modalBuy">Buy Now</button>
      </div>

    </div>

  </div>
</div>

  <script src="js/purchase.js"></script>

    <!-- ===== Footer Section ===== -->
    <footer class="site-footer" id="footer">
      <div class="container footer-inner">
        <div class="footer-col">
          <h3 class="footer-title">VioletVixen</h3>
          <p class="footer-text">Spicey books for all your reading needs.</p>
        </div>

       

      <div class="container footer-bottom">
        <p class="copyright">
          © <span id="year"></span> VioletVixen. All rights reserved.
        </p>
      </div>
    </footer>
  
  </body>
</html>
